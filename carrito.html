<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="d-flex flex-column min-vh-100">
  <header>
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark" aria-label="Eighth navbar example">
      <div class="container">
        <a class="navbar-brand" href="#">Logo</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample07"
          aria-controls="navbarsExample07" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarsExample07">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="catalogo.html">Catálogo</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Carrito</a>
            </li>
          </ul>
          <div class="row align-items-center gap-3">
            <div class="text-white col" id="divBienvenida"></div>
            <div class="col-12 col-lg-auto">
              <button class="btn btn-danger" id="btnCerrarSesion">
                Cerrar sesion
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="mt-5 pt-4 container pb-5 flex-fill">
    <h1 class="text-center py-3">Mi carrito</h1>
    <div class="row" id="rowCarrito">
      <!-- Productos -->
      <div class="col-lg-7 mb-3">
        <div id="contenedorCarrito"></div>
      </div>
      <!-- Resumen -->
      <div class="col-12 col-lg-5" id="colResumen">
          <div class="card p-4 shadow-sm border-0">
            <h3 class="h5 mb-3 fw-bold text-dark border-bottom pb-2">Resumen</h3>
            <div id="contenedorResumen" class="small text-secondary fw-semibold py-2"></div>
            <hr>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <span class="text-secondary h5 m-0">Total:</span>
              <span id="totalCarrito" class="h3 m-0 fw-bold text-pink">$0</span>
            </div>
            <div class="d-flex flex-column gap-2">
              <button class="btn btn-primary w-100 py-2 fw-bold shadow-sm" id="btnFinalizarCompra">
                <i class="bi bi-credit-card me-1"></i> Finalizar compra
              </button>
              <button class="btn btn-sm btn-link text-danger text-decoration-none mt-1" id="btnVaciarCarrito">
                <i class="bi bi-trash3 me-1"></i> Vaciar Carrito
              </button>
            </div>
          </div>
        </div>
    </div>
  </main>

  <footer class="border-top mt-4">
    <div class="container d-flex flex-wrap justify-content-between align-items-center p-4">
      <div class="col-md-4 d-flex align-items-center">
        <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap">
        </a>
        <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Dulcemax, Inc</span>
      </div>
      <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="WhatsAppBusiness" style="text-decoration: none">
            <i class="bi bi-whatsapp"></i> 291-4543221
          </a>
        </li>
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Email" style="text-decoration: none">
            <i class="bi bi-envelope-at"></i> contacto@dulcemax.com
          </a>
        </li>
      </ul>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="./js/carrito.js"></script>

</html>
