<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etiquetas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon" href="./logo/logoDulceMax/logoDulceMaxCentroTransparente.png" type="image/x-icon">
</head>

<body class="d-flex flex-column min-vh-100">
  <header>
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-violeta border-bottom-rosa shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="#"> <img src="logo/logoDulceMax/logoDulceMaxCentroTransparente.png" width="44" alt="logoDulceMax"> 
        <span class="fw-bold text-white">DulceMax</span>
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarPrincipal" aria-controls="navbarPrincipal" aria-expanded="false"
          aria-label="Abrir barra de navegación">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarPrincipal">
          <div id="contenedorLinks" class="me-auto"></div>
          <div class="d-flex align-items-center gap-3">
            <div class="text-white small fw-semibold" id="divBienvenida"></div>
            <button class="btn btn-sm px-3 btn-cerrar-sesion" id="btnCerrarSesion">
              <i class="bi bi-door-closed"></i> Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main class="flex-fill">
    <section class="mt-5 pt-4 container">
      <div class="col-md-10 mx-auto col-lg-8">
        <h1 class="text-center py-3">Crear etiquetas</h1>
        <form id="formAltaEtiqueta" class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="inputNombre" placeholder="Ingrese Etiqueta" />
            <label for="inputNombre">Nombre</label>
            <div id="feedbackNombre"></div>
          </div>
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="inputDescripcion" placeholder="Ingrese Descripcion" />
            <label for="floatingInput">Descripcion</label>
            <div id="feedbackDescripcion"></div>
          </div>

          <button class="w-100 btn btn-lg btn-primary" type="submit">
            Crear
          </button>
        </form>
      </div>
    </section>

    <section class="mt-5 pt-4 container text-center">

      <h2>Listado etiquetas</h2>

      <div class="table-responsive mt-4" id="contenedorTabla">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Etiqueta</th>
              <th>Descripcion</th>
              <th>Editar</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody id="tablaEtiquetas">
          </tbody>
        </table>
      </div>

      <div id="msjEtiquetas" class="text-center p-5 shadow-sm mx-auto bg-white rounded mt-4">
        Aun no has registrado etiquetas.
      </div>
      <div class="row justify-content-end mt-3 gap-0">
        <div class="col-auto">
          <button class="btn btn-outline-success" id="btnListadoPred">
            Listado predeterminado
          </button>
        </div>
        <div class="col-auto">
          <button class="btn btn-outline-danger" id="btnBorrarTodasEti">
            Borrar todas
          </button>
        </div>
      </div>

    </section>
    <!-- Modal -->
    <div class="modal fade" id="modalEditarEtiqueta" tabindex="-1" aria-labelledby="exampleModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              Editar etiqueta
            </h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
              id="btnCerrarModal"></button>
          </div>
          <div class="modal-body">
            <form id="modalFormAltaEtiqueta" class="p-4 p-md-5 rounded-3">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="modalInputNombre" name="nombre de la Etiqueta"
                  placeholder="Ingrese etiqueta" />
                <label for="modalInputNombre">Nombre</label>
                <div id="feedbackNombreModal"></div>
              </div>
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="modalInputDescripcion" name="descripcion de la Etiqueta"
                  placeholder="Ingrese descripcion" />
                <label for="modalInputDescripcion">Descripcion</label>
                <div id="feedbackDescripcionModal"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button type="button" class="btn btn-primary" id="btnGuardarCambios">
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>
  <footer class="border-top mt-4">
    <div class="container d-flex flex-wrap justify-content-between align-items-center p-4">
      <div class="col-md-4 d-flex align-items-center">
        <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap">
        </a>
        <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Dulcemax, Inc</span>
      </div>
      <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="WhatsAppBusiness" style="text-decoration: none">
            <i class="bi bi-whatsapp"></i> 291-4543221
          </a>
        </li>
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Email" style="text-decoration: none">
            <i class="bi bi-envelope-at"></i> contacto@dulcemax.com
          </a>
        </li>
      </ul>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="./js/etiquetas.js"></script>
</body>

</html>
