<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header>
      <nav
        class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark"
        aria-label="Eighth navbar example"
      >
        <div class="container">
          <a class="navbar-brand" href="#">Logo</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample07"
            aria-controls="navbarsExample07"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarsExample07">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Usuarios</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="productos.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="clasificacion.html">Clasificacion</a>
              </li>
            </ul>
            <div class="row align-items-center gap-3">
              <span class="text-white col">Bienvenido pepito</span>
              <div class="col-12 col-lg-auto">
                <button class="btn btn-danger">Cerrar sesion</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main class="mt-5 pt-4 container">
      <div class="col-md-10 mx-auto col-lg-8">
        <h1 class="text-center py-3">Registro de usuarios</h1>
        <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="floatingInput"
              placeholder="tunombredeusuario"
            />
            <label for="floatingInput">Nombre de usuario</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="Password"
            />
            <label for="floatingPassword">Contraseña</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="Password"
            />
            <label for="floatingPassword">Repetir contraseña</label>
          </div>

          <button class="w-100 btn btn-lg btn-primary" type="submit">
            Registrar
          </button>
        </form>
      </div>

      <header>
        <h2 class="text-center py-3 mt-5">Lista de usuarios</h2>
      </header>
      <div class="table-responsive">
        <table class="table table-striped mt-3 text-center">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Gestionar</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Pepito</td>
              <td>Usuario</td>
              <td>Habilitado</td>
              <td>
                <button type="button" class="btn btn-outline-danger">
                  Deshabilitar
                </button>
              </td>
              <td>
                <button type="button" class="btn btn-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr>
              <td>Juancito</td>
              <td>Usuario</td>
              <td>Deshabilitado</td>
              <td>
                <button type="button" class="btn btn-outline-success">
                  Habilitar
                </button>
              </td>
              <td>
                <button type="button" class="btn btn-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr>
              <td>Mengano</td>
              <td>Administrador</td>
              <td>Habilitado</td>
              <td>
                <button type="button" class="btn btn-outline-danger">
                  Deshabilitar
                </button>
              </td>
              <td>
                <button type="button" class="btn btn-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
