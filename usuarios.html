<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="d-flex flex-column min-vh-100">
  <header>
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-violeta border-bottom-rosa shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#"> Dulcemax </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarPrincipal" aria-controls="navbarPrincipal" aria-expanded="false"
          aria-label="Abrir barra de navegación">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarPrincipal">
          <div id="contenedorLinks" class="me-auto"></div>
          <div class="d-flex align-items-center gap-3">
            <div class="text-white small fw-semibold" id="divBienvenida"></div>
            <button class="btn btn-sm px-3 btn-cerrar-sesion" id="btnCerrarSesion">
              <i class="bi bi-door-closed"></i> Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main class="mt-5 pt-4 container flex-fill">
    <section class="col-md-10 mx-auto col-lg-8">
      <h1 class="text-center py-3">Registro de usuarios</h1>
      <form id="formAltaUsuario" class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="inputNombre" placeholder="tunombredeusuario" name="nombre" />
          <label for="inputNombre">Nombre de usuario</label>
          <div id="feedbackNombre"></div>
        </div>
        <div class="form-floating mb-3">
          <select name="rol" class="form-select" id="selectRol" aria-label="Floating label select">
            <option value="" disabled selected>Seleccione una opción</option>
            <option value="Administrador">Administrador</option>
            <option value="Usuario">Usuario</option>
          </select>
          <label for="selectRol">Rol</label>
          <div id="feedbackRol"></div>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="inputContrasenia" placeholder="Contraseña"
            name="contraseña" />
          <label for="inputContrasenia">Contraseña</label>
          <div id="feedbackContrasenia"></div>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="inputRepetirContrasenia" placeholder="Repetir la contraseña"
            name="repetir" />
          <label for="inputRepetirContrasenia">Repetir contraseña</label>
          <div id="feedbackRepetirContra"></div>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit" id="btnRegistrarUsuario">
          Registrar
        </button>
      </form>
    </section>

    <section class="mt-5">
      <h2 class="text-center py-3">Lista de usuarios</h2>
      <div id="divTabla" class="table-responsive">
        <table class="table table-striped mt-3 text-center">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Gestionar</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody id="tablaUsuarios"></tbody>
        </table>
      </div>
      <div id="divMensajeTabla" class="text-center p-5 bg-secondary-subtle card lead">Aun no has registrado usuarios.
      </div>
    </section>
  </main>

  <footer class="border-top mt-4">
    <div class="container d-flex flex-wrap justify-content-between align-items-center p-4">
      <div class="col-md-4 d-flex align-items-center">
        <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap">
        </a>
        <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Dulcemax, Inc</span>
      </div>
      <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="WhatsAppBusiness" style="text-decoration: none">
            <i class="bi bi-whatsapp"></i> 291-4543221
          </a>
        </li>
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Email" style="text-decoration: none">
            <i class="bi bi-envelope-at"></i> contacto@dulcemax.com
          </a>
        </li>
      </ul>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="js/usuarios.js"></script>
</body>

</html>
