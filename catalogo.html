<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Eighth navbar example">
      <div class="container">
        <a class="navbar-brand" href="#">Logo</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample07"
          aria-controls="navbarsExample07" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarsExample07">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Catalogo</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Carrito</a></li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <span class="text-white">Bienvenido pepito</span>
            <button class="btn btn-danger">Cerrar sesion</button>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div class="container">
      <h1 class="text-center py-3">Catalogo</h1>
      <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">

          <div class="col">
            <div class="card">
              <img src="https://www.golomax.com.ar/uploads/centum/articles/home/13018622_1.jpg" class="card-img-top"
                alt="..." />
              <div class="card-body bg-info justify-content-center">
                <h5 class="card-title">Alfajor RASTA Negro x70g.</h5>
                <div class="selector-cantidad row">
                  <div class="col-auto">
                    <button class="btn btn-primary">-</button>
                  </div>
                  <div class="col">
                    <input type="number" name="" id="" class="form-control">
                  </div>
                  <div class="col-auto">
                    <button class="btn btn-primary">+</button>
                  </div>

                </div>
                <div class="card-text">Precio unitario: <span>$1000</span></div>
                <div>
                  <div class="card-text">Precio mayorista: <span>$900</span></div>
                  <span>(Minimo 10 unidades)</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
  </main>

  <div class="container">
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
      <div class="col-md-4 d-flex align-items-center">
        <span class="text-body-secondary">© 2026 Dulcemax, Inc</span>
      </div>
      <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="WhatsAppBusiness" style="text-decoration: none">
            <i class="bi bi-whatsapp"></i> 291-4543221
          </a>
        </li>
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Email" style="text-decoration: none">
            <i class="bi bi-envelope-at"></i> contacto@dulcemax.com
          </a>
        </li>
      </ul>
    </footer>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
