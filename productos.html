<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <header>
      <nav
        class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark"
        aria-label="Eighth navbar example"
      >
        <div class="container">
          <a class="navbar-brand" href="#">Logo</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample07"
            aria-controls="navbarsExample07"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarsExample07">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="usuarios.html">Usuarios</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Productos</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="clasificacion.html">Clasificacion</a>
              </li>
            </ul>
            <div class="row align-items-center gap-3">
              <span class="text-white col">Bienvenido pepito</span>
              <div class="col-12 col-lg-auto">
                <button class="btn btn-danger">Cerrar sesion</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <div class="mt-5 pt-4 container">
      <div class="col-md-10 mx-auto col-lg-8">
        <h1 class="text-center py-3">Gestionar productos</h1>
        <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="floatingInput"
              placeholder="nombreproducto"
            />
            <label for="floatingInput">Nombre del producto</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="floatingInput"
              placeholder="descripcionproducto"
            />
            <label for="floatingInput">Descripcion</label>
          </div>

          <div class="row g-3">
            <div class="col">
              <input
                type="text"
                class="form-control"
                placeholder="Precio"
                aria-label="precioproducto"
              />
            </div>
            <div class="col">
              <input
                type="text"
                class="form-control"
                placeholder="Stock"
                aria-label="stockproducto"
              />
            </div>
          </div>

          <select
            class="form-select form-floating mt-3 mb-3 p-2"
            aria-label="Default select example"
          >
            <option selected disabled>Seleccione una categoria..</option>
            <option value="alfajor">Alfajor</option>
            <option value="gomita">Gomita</option>
            <option value="chocolate">Chocolate</option>
            <option value="chupetin">Chupetin</option>
          </select>

          <select
            class="form-select form-floating mb-3 p-2"
            aria-label="Default select example"
          >
            <option selected disabled>Seleccione una etiqueta..</option>
            <option value="">Ninguna</option>
            <option value="oferta">Oferta</option>
          </select>

          <button class="w-100 btn btn-lg btn-primary" type="submit">
            Añadir producto al catalogo
          </button>
        </form>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
