          </ul>
          <div class="row align-items-center gap-3">
            <div class="text-white col" id="divBienvenida"></div>
            <div class="col-12 col-lg-auto">
              <button class="btn btn-danger" id="btnCerrarSesion">
                Cerrar sesion
              </button>
            </div>

  </header>

  <main class="container pb-4 flex-fill">
    <section class="mt-5 pt-4">
      <div class="col-md-10 mx-auto col-lg-8">
        <h1 class="text-center py-3">Gestionar productos</h1>

        <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary" id="formRegistrarProducto">

          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="inputNombre" name="nombre" placeholder="nombreproducto" />
            <label for="inputNombre">Nombre del producto</label>
            <div id="feedbackNombre"></div>
          </div>

          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="inputDescripcion" name="descripción"
              placeholder="descripcionproducto" />
            <label for="inputDescripcion">Descripcion</label>
            <div id="feedbackDescripcion"></div>
          </div>

          <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-3">
            <div class="col">
              <div class="form-floating">
                <input type="number" class="form-control" name="precio minorista" placeholder="precio minorista"
                  id="inputPrecioMinorista" min="0" />
                <label for="inputPrecioMinorista">Precio minorista</label>
                <div id="feedbackPrecioMinorista"></div>
              </div>
            </div>

            <div class="col">
              <div class="form-floating">
                <input type="number" class="form-control" placeholder="precio mayorista" id="inputPrecioMayorista"
                  name="precio mayorista" min="0" />
                <label for="inputPrecioMayorista">Precio mayorista</label>
                <div id="feedbackPrecioMayorista"></div>
              </div>
            </div>

            <div class="col">
              <div class="col form-floating">
                <input type="number" class="form-control" placeholder="cantidad minima para precio mayorista"
                  id="inputCantMay" name="cantidad mayorista" min="0" />
                <label for="inputCantMay">Cant mayorista</label>
                <div id="feedbackCantMay"></div>
              </div>
            </div>

            <div class="col">
              <div class="form-floating">
                <input type="number" class="form-control" placeholder="stock" id="inputStock" name="stock" min="0" />
                <label for="inputStock">Stock</label>
                <div id="feedbackStock"></div>
              </div>
            </div>

          </div>

          <div class="form-floating my-3">
            <select class="form-select" id="selectCategoria"></select>
            <label for="selectCategoria">Categoría</label>
            <div id="feedbackCategoria"></div>
          </div>

          <div class="mb-3 px-3 py-2 border rounded bg-white">
            <label class="form-label text-muted small mb-2">Etiquetas</label>
            <div class="d-flex flex-wrap gap-3" id="contenedorEtiquetas"></div>
          </div>

          <div class=" my-3 border rounded bg-white p-3">
            <div class="row g-4 align-items-center">
              <div class="col-md-8">
                <div class="d-flex flex-column">
                  <div class="form-floating">
                    <select class="form-select " id="selectImagen">
                      <option selected value="sin-foto">Sin foto</option>
                      <option value="alfajor-blanco">Alfajor blanco</option>
                      <option value="alfajor-negro">Alfajor negro</option>
                      <option value="chupetin">Chupetin</option>
                      <!-- <option value="gomita">Gomita</option>
                      <option value="chocolate">Chocolate</option> -->
                    </select>
                    <label for="selectImagen">Imagenes precargadas</label>
                  </div>
                  <p class="text-center my-1">o</p>
                  <div class="form-floating">
                    <input type="text" name="url-imagen" id="inputImgURL" class="form-control" placeholder="url-imagen">
                    <label for="inputImgURL">URL Imagen personalizada</label>
                  </div>
                </div>
              </div>
              <div class="col text-center">
                <img src="" class="img-thumbnail" alt="..." id="imgPreview" />
              </div>
            </div>
          </div>

          <button class="w-100 btn btn-lg btn-primary" type="submit">
            Registrar producto
          </button>
        </form>
      </div>
    </section>

    <section class="mt-5 pt-4">
      <h2 class="text-center py-3">Listado de productos</h2>
      <div class="row row-cols-1 mt-4" id="divContenedorListado"></div>
      <div class="row justify-content-end mt-3 gap-0">
          <div class="col-auto">
            <button class="btn btn-outline-success" id="btnListadoPred">
              Listado predeterminado
            </button>
          </div>
          <div class="col-auto">
            <button class="btn btn-outline-danger" id="btnBorrarProductos">
              Borrar todos
            </button>
          </div>
        </div>
    </section>





    <!-- Modal -->
    <div class="modal fade" id="modalFormulario" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="tituloModal">
              Editar Producto
            </h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
              <form class="p-3" id="modalFormEditar">

              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="modalInputNombre" name="nombre" placeholder="nombreproducto" />
                <label for="modalInputNombre">Nombre del producto</label>
                <div id="feedbackNombreModal"></div>
              </div>

              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="modalInputDescripcion" name="descripción"
                  placeholder="descripcionproducto" />
                <label for="modalInputDescripcion">Descripcion</label>
                <div id="feedbackDescripcionModal"></div>
              </div>

              <div class="row row-cols-1 row-cols-sm-2 g-3">
                <div class="col">
                  <div class="form-floating">
                    <input type="number" class="form-control" name="precio minorista" placeholder="precio minorista"
                      id="modalInputPrecioMinorista" min="0" />
                    <label for="modalInputPrecioMinorista">Precio minorista</label>
                    <div id="feedbackPrecioMinoristaModal"></div>
                  </div>
                </div>

                <div class="col">
                  <div class="form-floating">
                    <input type="number" class="form-control" placeholder="precio mayorista" id="modalInputPrecioMayorista"
                      name="precio mayorista" min="0" />
                    <label for="modalInputPrecioMayorista">Precio mayorista</label>
                    <div id="feedbackPrecioMayoristaModal"></div>
                  </div>
                </div>

                <div class="col">
                  <div class="col form-floating">
                    <input type="number" class="form-control" placeholder="cantidad minima para precio mayorista"
                      id="modalInputCantMay" name="cantidad mayorista" min="0" />
                    <label for="modalInputCantMay">Cant mayorista</label>
                    <div id="feedbackCantMayModal"></div>
                  </div>
                </div>

                <div class="col">
                  <div class="form-floating">
                    <input type="number" class="form-control" placeholder="stock" id="modalInputStock" name="stock"
                      min="0" />
                    <label for="modalInputStock">Stock</label>
                    <div id="feedbackStockModal"></div>
                  </div>
                </div>
              </div>

              <div class="form-floating my-3">
                <select class="form-select" id="modalSelectCategoria" name="Categoria"></select>
                <label for="modalSelectCategoria">Categoría</label>
                <div id="feedbackCategoriaModal"></div>
              </div>

              <div class="mb-3 px-3 py-2 border rounded bg-white">
                <label class="form-label text-muted small mb-2">Etiquetas</label>
                <div class="d-flex flex-wrap gap-3" id="modalContenedorEtiquetas"></div>
              </div>

              <div class=" my-3 border rounded bg-white p-3">
                <div class="row g-4 align-items-center">
                  <div class="col-md-8">
                    <div class="d-flex flex-column">
                      <div class="form-floating">
                        <select class="form-select " id="modalSelectImagen">
                          <option selected value="sin-foto">Sin foto</option>
                          <option value="alfajor-blanco">Alfajor blanco</option>
                          <option value="alfajor-negro">Alfajor negro</option>
                          <option value="chupetin">Chupetin</option>
                        </select>
                        <label for="modalSelectImagen">Imagenes precargadas</label>
                      </div>
                      <p class="text-center my-1">o</p>
                      <div class="form-floating">
                        <input type="text" name="url-imagen" id="modalInputImgURL" class="form-control"
                          placeholder="url-imagen">
                        <label for="modalInputImgURL">URL Imagen personalizada</label>
                      </div>
                    </div>
                  </div>
                  <div class="col text-center">
                    <img src="" class="img-thumbnail" alt="..." id="modalImgPreview" />
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="btnCerrarModal">
              Cancelar
            </button>
            <button type="button" class="btn btn-primary" id="btnGuardarCambios">
              Guardar cambios
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
